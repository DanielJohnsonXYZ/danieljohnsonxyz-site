<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="Work with me — growth system diagram">
  <title>Work with me</title>
  <desc>Abstract diagram showing a connected growth system: ICP, channel, dashboard nodes flowing together.</desc>
  <defs>
    <linearGradient id="gradWWM" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0B0B0C"/>
      <stop offset="100%" stop-color="#3a2168"/>
    </linearGradient>
    <linearGradient id="gradWWMaccent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#7B3EFF"/>
      <stop offset="100%" stop-color="#A445FF"/>
    </linearGradient>
  </defs>
  <rect width="320" height="220" fill="url(#gradWWM)" rx="14"/>
  <!-- Subtle dot grid -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="40" cy="40" r="1"/><circle cx="80" cy="40" r="1"/><circle cx="120" cy="40" r="1"/><circle cx="160" cy="40" r="1"/><circle cx="200" cy="40" r="1"/><circle cx="240" cy="40" r="1"/><circle cx="280" cy="40" r="1"/>
    <circle cx="40" cy="80" r="1"/><circle cx="80" cy="80" r="1"/><circle cx="120" cy="80" r="1"/><circle cx="160" cy="80" r="1"/><circle cx="200" cy="80" r="1"/><circle cx="240" cy="80" r="1"/><circle cx="280" cy="80" r="1"/>
    <circle cx="40" cy="120" r="1"/><circle cx="80" cy="120" r="1"/><circle cx="120" cy="120" r="1"/><circle cx="160" cy="120" r="1"/><circle cx="200" cy="120" r="1"/><circle cx="240" cy="120" r="1"/><circle cx="280" cy="120" r="1"/>
    <circle cx="40" cy="160" r="1"/><circle cx="80" cy="160" r="1"/><circle cx="120" cy="160" r="1"/><circle cx="160" cy="160" r="1"/><circle cx="200" cy="160" r="1"/><circle cx="240" cy="160" r="1"/><circle cx="280" cy="160" r="1"/>
  </g>
  <!-- Node 1 -->
  <g>
    <circle cx="60" cy="110" r="22" fill="none" stroke="#A445FF" stroke-width="1.5" opacity="0.85"/>
    <text x="60" y="113" text-anchor="middle" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">ICP</text>
  </g>
  <!-- Connecting lines -->
  <path d="M84 110 L160 80" stroke="url(#gradWWMaccent)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M84 110 L160 140" stroke="url(#gradWWMaccent)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Node 2 -->
  <g>
    <circle cx="160" cy="80" r="20" fill="#7B3EFF" opacity="0.9"/>
    <text x="160" y="83" text-anchor="middle" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">CHANNEL</text>
  </g>
  <!-- Node 3 -->
  <g>
    <circle cx="160" cy="140" r="20" fill="none" stroke="#A445FF" stroke-width="1.5"/>
    <text x="160" y="143" text-anchor="middle" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">OFFER</text>
  </g>
  <!-- Connecting -->
  <path d="M180 80 L240 110" stroke="url(#gradWWMaccent)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M180 140 L240 110" stroke="url(#gradWWMaccent)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Node 4 -->
  <g>
    <rect x="218" y="92" width="44" height="36" fill="none" stroke="#A445FF" stroke-width="1.5" rx="4"/>
    <text x="240" y="115" text-anchor="middle" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">RHYTHM</text>
  </g>
  <!-- Caption -->
  <text x="160" y="195" text-anchor="middle" fill="#fff" opacity="0.75" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.1em">SENIOR GROWTH OPERATOR</text>
</svg>
