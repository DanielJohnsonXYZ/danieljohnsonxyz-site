version: 2
updates:
  # npm dependencies (Astro, Tailwind, build toolchain)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk dev/build tooling into a single PR to cut review noise.
      build-tooling:
        patterns:
          - "@astrojs/*"
          - "@tailwindcss/*"
          - "tailwindcss"
          - "typescript"
          - "vite"
        update-types:
          - minor
          - patch
    labels:
      - dependencies

  # GitHub Actions used in CI (supply-chain hygiene for pinned action versions)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
