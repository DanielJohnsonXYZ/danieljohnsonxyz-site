name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Least privilege: the build only needs to read the repo. Overrides the
# default broad GITHUB_TOKEN scopes granted to workflow runs.
permissions:
  contents: read

# Cancel superseded runs on the same ref so a force-push or rapid pushes
# don't pile up redundant CI.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Astro check
        run: npm run check

      - name: Build
        run: npm run build

      # Advisory only: surfaces known-vulnerable dependencies without blocking
      # deploys on transitive advisories that have no upstream fix yet.
      - name: Audit dependencies (advisory)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true
